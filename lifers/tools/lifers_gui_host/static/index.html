<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lifers · 终身监禁者 AI 助手</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <!-- 训练监控面板（完全隐藏，Ctrl+M打开） -->
  <div id="training-monitor" class="training-monitor hidden">
    <div class="monitor-header" id="monitor-toggle">
      <span class="monitor-title">训练监控</span>
      <span id="monitor-summary" class="monitor-summary"></span>
      <span class="monitor-arrow">▼</span>
    </div>
    <div class="monitor-body" id="monitor-body">
      <div class="monitor-section">
        <div class="monitor-section-title">Deep Escalate</div>
        <div id="monitor-deep" class="monitor-detail"></div>
      </div>
      <div class="monitor-section">
        <div class="monitor-section-title">Kali 训练</div>
        <div id="monitor-kali" class="monitor-detail"></div>
      </div>
      <div class="monitor-section">
        <div class="monitor-section-title">数据状态</div>
        <div id="monitor-data" class="monitor-detail monitor-grid"></div>
      </div>
      <div class="monitor-section">
        <div class="monitor-section-title">支柱权重</div>
        <div id="monitor-pillars" class="monitor-detail monitor-grid"></div>
      </div>
    </div>
  </div>

  <!-- 顶部导航栏 -->
  <header class="topbar">
    <div class="topbar-left">
      <span class="logo">Lifers</span>
      <span class="codename">终身监禁者</span>
    </div>
    <div class="topbar-center">
      <span id="connection-status" class="status-dot offline"></span>
      <span id="status-text">未连接</span>
    </div>
    <div class="topbar-right">
      <span class="model-label">Lifers Deep</span>
      <button id="btn-toggle-files" class="topbar-btn" title="文件浏览">文件</button>
      <button id="btn-toggle-terminal" class="topbar-btn" title="终端">终端</button>
      <button id="btn-clear" class="topbar-btn" title="清空对话">清空</button>
      <button id="btn-settings" class="topbar-btn" title="设置">设置</button>
    </div>
  </header>

  <!-- 主区域 -->
  <div class="main-container">
    <!-- 左侧：文件浏览器 -->
    <aside id="file-browser" class="sidebar left-sidebar hidden">
      <div class="sidebar-header">
        <span>文件浏览</span>
        <div class="sidebar-actions">
          <button id="btn-refresh-files" class="sidebar-btn-sm">刷新</button>
          <button id="btn-upload-file" class="sidebar-btn-sm">上传</button>
        </div>
      </div>
      <div class="sidebar-body">
        <div id="file-tree" class="file-tree">
          <div class="file-tree-loading">加载中...</div>
        </div>
      </div>
    </aside>

    <!-- 对话区域 -->
    <main class="chat-main">
      <!-- 欢迎界面 -->
      <div id="welcome" class="welcome">
        <div class="welcome-logo">Lifers</div>
        <h1>终身监禁者 AI 助手</h1>
        <p class="welcome-sub">本地智能推理引擎 · 文件分析 · 终端集成 · 全离线运行</p>
        <div class="welcome-tips">
          <div class="tip-card" data-msg="你好Lifers，介绍一下你自己。">
            <div class="tip-icon">👋</div>
            <div class="tip-text">自我介绍</div>
          </div>
          <div class="tip-card" data-msg="帮我分析一下最近的工作效率如何提升？">
            <div class="tip-icon">📊</div>
            <div class="tip-text">工作分析</div>
          </div>
          <div class="tip-card" data-msg="解释一下什么是深度学习中的注意力机制？">
            <div class="tip-icon">🧠</div>
            <div class="tip-text">技术问答</div>
          </div>
          <div class="tip-card" data-msg="我最近感觉很焦虑，能跟你聊聊吗？">
            <div class="tip-icon">💬</div>
            <div class="tip-text">情感陪伴</div>
          </div>
        </div>
      </div>

      <!-- 消息列表 -->
      <div id="messages" class="messages"></div>

      <!-- 拖拽上传提示层 -->
      <div id="drop-overlay" class="drop-overlay hidden">
        <div class="drop-hint">
          <div class="drop-icon">📁</div>
          <div>释放文件以上传</div>
        </div>
      </div>

      <!-- 文件预览条 -->
      <div id="file-preview-bar" class="file-preview-bar hidden"></div>

      <!-- 输入区域 -->
      <div class="input-area">
        <div class="input-toolbar">
          <button id="btn-attach-file" class="input-tool-btn" title="上传文件">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <button id="btn-attach-image" class="input-tool-btn" title="上传图片">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </button>
          <button id="btn-mic" class="input-tool-btn" title="语音输入">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </button>
          <span class="input-toolbar-spacer"></span>
          <span id="upload-status" class="upload-status"></span>
        </div>
        <div class="input-row">
          <textarea id="user-input" rows="1" placeholder="输入消息... (Enter 发送, Shift+Enter 换行, 可拖拽文件)" autofocus></textarea>
          <button id="btn-send" class="btn-send" title="发送消息">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M2 10l16-8-8 16-2-6-6-2z"/></svg>
          </button>
        </div>
        <div class="input-footer">
          <span id="char-count">0 / 4000</span>
          <span id="response-time"></span>
        </div>
      </div>
    </main>

    <!-- 右侧：终端面板 -->
    <aside id="terminal-panel" class="sidebar right-sidebar hidden">
      <div class="sidebar-header">
        <span>终端</span>
        <div class="sidebar-actions">
          <select id="term-shell" class="sidebar-select">
            <option value="cmd">CMD</option>
            <option value="powershell">PowerShell</option>
            <option value="bash">Bash</option>
          </select>
          <button id="btn-term-exec" class="sidebar-btn-sm">执行</button>
          <button id="btn-term-clear" class="sidebar-btn-sm">清空</button>
        </div>
      </div>
      <div class="sidebar-body">
        <div id="term-output" class="term-output">
          <div class="term-welcome">Lifers Terminal · 输入命令后按执行</div>
        </div>
        <div class="term-input-row">
          <span class="term-prompt">$</span>
          <input type="text" id="term-input" class="term-input" placeholder="输入命令..." autocomplete="off" />
        </div>
      </div>
    </aside>
  </div>

  <!-- 隐藏的文件input -->
  <input type="file" id="hidden-file-input" style="display:none" multiple />
  <input type="file" id="hidden-image-input" style="display:none" accept="image/*" multiple />

  <!-- 设置面板 -->
  <div id="settings-panel" class="settings-panel hidden">
    <div class="settings-overlay" id="settings-overlay"></div>
    <div class="settings-content">
      <h2>设置</h2>
      <div class="settings-group">
        <label>Gate 服务器地址</label>
        <input type="text" id="cfg-gate-url" value="http://127.0.0.1:55555" />
      </div>
      <div class="settings-group">
        <label>最大响应长度</label>
        <input type="number" id="cfg-max-chars" value="2000" min="100" max="8000" />
      </div>
      <div class="settings-group">
        <label>温度参数</label>
        <input type="range" id="cfg-temperature" min="0.1" max="2.0" step="0.1" value="0.8" />
        <span id="temp-value">0.8</span>
      </div>
      <div class="settings-group">
        <label class="checkbox-label">
          <input type="checkbox" id="cfg-stream" checked /> 流式输出
        </label>
      </div>
      <div class="settings-group">
        <label class="checkbox-label">
          <input type="checkbox" id="cfg-auto-scroll" checked /> 自动滚动
        </label>
      </div>
      <div class="settings-actions">
        <button id="btn-save-settings" class="btn-primary">保存</button>
        <button id="btn-close-settings" class="btn-secondary">取消</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
