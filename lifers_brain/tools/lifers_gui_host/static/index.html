<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lifers · 自研宿主</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="titlebar">
    <span class="title" id="win-title">Lifers GUI Host</span>
    <span class="meta" id="meta-line"></span>
  </header>
  <div class="shell">
    <section class="workbench" aria-label="工作区">
      <div class="wb-head">
        <button type="button" id="btn-monaco" class="btn-secondary">加载 Monaco（优先离线 vendor）</button>
        <span id="monaco-status" class="wb-hint"></span>
      </div>
      <div id="monaco-host" class="monaco-host hidden" aria-label="Monaco"></div>
      <textarea id="editor-buf" class="editor-fallback" spellcheck="false" title="离线缓冲：字体与 vscodium_editor_defaults 对齐"></textarea>
    </section>
    <section class="chat" aria-label="对话">
      <div id="log" class="log" aria-live="polite"></div>
      <div class="composer">
        <textarea id="input" rows="3" placeholder="输入消息…（与 Agents Chat 相同：完整中文句、search …、Ctrl+Enter 发送）"></textarea>
        <button type="button" id="send">发送</button>
      </div>
    </section>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
